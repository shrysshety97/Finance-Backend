# ─────────────────────────────────────────────────────────
# Finance Backend - Application Configuration
# ─────────────────────────────────────────────────────────

# Server
server.port=8080

# ─── DataSource ───────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/finance_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=MySQL(80)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool (HikariCP - default in Spring Boot)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ─── JPA / Hibernate ──────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ─── JWT ──────────────────────────────────────────────────
# Secret must be a Base64-encoded string of at least 256 bits (32 bytes).
# Generate via: openssl rand -base64 64
app.jwt.secret=ZmluYW5jZS1iYWNrZW5kLXN1cGVyLXNlY3JldC1rZXktZm9yLWp3dC10b2tlbi1zaWduaW5nLTIwMjQ=
# Token expiry: 24 hours in milliseconds
app.jwt.expiration-ms=86400000

# ─── Logging ──────────────────────────────────────────────
logging.level.com.finance=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# ─── SpringDoc / Swagger UI ───────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.tryItOutEnabled=true
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
